name: Build and Push SIPBridge

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # ✅ QEMU aktivieren (für ARM64 Emulation)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ✅ buildx im Docker-Container Modus erstellen (Multi-Arch-fähig!)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ lowercase owner erzeugen
      - name: Derive lowercase owner
        id: vars
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # ✅ Login
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Multi-Arch Build (arm64 + amd64)
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.vars.outputs.owner_lc }}/gatecore-panel:latest
