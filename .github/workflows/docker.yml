name: Build and Push GateCore Panel

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Basis-Version (z.B. 1.0.0)"
        required: true
        type: string
      channel:
        description: "Release-Typ"
        required: true
        type: choice
        options:
          - Release
          - Alpha
          - Beta
          - Release Candidate
      prerelease_number:
        description: "Vorabversionsnummer (z.B. 1)"
        required: false
        default: -1
        type: number

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Create version tag
        id: version
        run: |
          TAG="v${{ github.event.inputs.version }}"

          if [ "${{ github.event.inputs.channel }}" = "Alpha" ]; then
            TAG="$TAG-alpha"
          elif [ "${{ github.event.inputs.channel }}" = "Beta" ]; then
            TAG="$TAG-beta"
          elif [ "${{ github.event.inputs.channel }}" = "Release Candidate" ]; then
            TAG="$TAG-rc"
          fi

          if [ "${{ github.event.inputs.channel }}" != "Release" ] && [ ${{ github.event.inputs.prerelease_number }} >= 0 ]; then
            TAG="$TAG.${{ github.event.inputs.prerelease_number }}"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Checkout
        uses: actions/checkout@v3

      # ✅ QEMU aktivieren (für ARM64 Emulation)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ✅ buildx im Docker-Container Modus erstellen (Multi-Arch-fähig!)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ lowercase owner erzeugen
      - name: Derive lowercase owner
        id: vars
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # ✅ Login
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Multi-Arch Build (arm64 + amd64)
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/gatecore-panel:latest
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/gatecore-panel:${{ steps.version.outputs.tag }}
