<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="docker.add_title">Docker Container hinzufügen</title>
    <link rel="stylesheet" href="/css/panel.css">
    <script src="/js/i18n.js" defer></script>
    <script src="/js/docker_add.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="sidebar">
        <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">
        <h2>GateCore-Panel</h2>
        <ul>
            <li><a href="/panel" data-i18n="sidebar.dashboard">Dashboard</a></li>
            <li><a href="/panel/docker" data-i18n="sidebar.docker">Docker</a></li>
            <li><a href="/panel/servers" data-i18n="sidebar.servers">Server</a></li>
            <li><a href="/panel/users" data-i18n="sidebar.users">Benutzer</a></li>
            <li><a href="/panel/logs" data-i18n="sidebar.logs">Logs</a></li>
            <li><a href="/panel/backup" data-i18n="sidebar.backup">Backup</a></li>
            <li><a href="/panel/storage" data-i18n="sidebar.storage">Speicher</a></li>
            <li><a href="/panel/settings" data-i18n="sidebar.settings">Einstellungen</a></li>
        </ul>
    </div>
    <div class="taskbar-oben">
        <div class="taskbar-oben-left">
            <h1 data-i18n="docker.add_title">Docker Container erstellen</h1>
        </div>
        <div class="taskbar-oben-right">
            <button onclick="window.location='/panel/docker'" data-i18n="button.back">Zurück</button>
            <button id="logoutButton" data-i18n="button.logout">Abmelden</button>
        </div>
    </div>
    <div class="statistiken">
        <div class="form-card">
            <h2 data-i18n="docker.create_new">Neuen Container erstellen</h2>
            <form id="dockerForm">
                <div class="form-group">
                    <label data-i18n="docker.name">Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label data-i18n="docker.server">Server</label>
                    <select id="server" required></select>
                </div>
                <div class="form-group">
                    <label data-i18n="docker.image">Image</label>
                    <input type="text" id="image" placeholder="nginx:latest" required>
                </div>
                <div class="form-group">
                    <label data-i18n="docker.command">Kommando (optional)</label>
                    <input type="text" id="command" placeholder="z.B. /bin/bash">
                </div>
                <div class="form-group">
                    <label data-i18n="docker.env">Umgebungsvariablen (KEY=value, kommagetrennt)</label>
                    <input type="text" id="env" placeholder="KEY1=val1,KEY2=val2">
                </div>
                <div class="form-group">
                    <label data-i18n="docker.volumes">Volumes (Host:Container, kommagetrennt)</label>
                    <input type="text" id="volumes" placeholder="/host/path:/container/path">
                </div>
                <div class="form-group">
                    <label data-i18n="docker.ports">Ports (Host:Container, kommagetrennt)</label>
                    <input type="text" id="ports" placeholder="80:80,443:443">
                </div>
                <div class="button-row">
                    <button type="submit" data-i18n="docker.create">Container erstellen</button>
                </div>
            </form>
            <div id="status"></div>
        </div>
    </div>
</body>
</html>
