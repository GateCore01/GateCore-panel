<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="server.add_title">Server hinzufügen</title>
    <script src="/js/i18n.js" defer></script>
    <script src="/js/server_add.js" defer></script>
    <link rel="stylesheet" href="/css/panel.css">
    <script src="/js/auth.js" defer></script>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="sidebar">
        <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">
        <h2>GateCore-Panel</h2>
        <ul>
            <li><a href="/panel" data-i18n="sidebar.dashboard">Dashboard</a></li>
            <li><a href="/panel/docker" data-i18n="sidebar.docker">Docker</a></li>
            <li><a href="/panel/servers" data-i18n="sidebar.servers">Server</a></li>
            <li><a href="/panel/users" data-i18n="sidebar.users">Benutzer</a></li>
            <li><a href="/panel/logs" data-i18n="sidebar.logs">Logs</a></li>
            <li><a href="/panel/backup" data-i18n="sidebar.backup">Backup</a></li>
            <li><a href="/panel/storage" data-i18n="sidebar.storage">Speicher</a></li>
            <li><a href="/panel/settings" data-i18n="sidebar.settings">Einstellungen</a></li>
        </ul>
    </div>
    <div class="taskbar-oben">
        <div class="taskbar-oben-left">
            <h1 data-i18n="server.add_title">Server hinzufügen</h1>
        </div>
        <div class="taskbar-oben-right">
            <button id="logoutButton" data-i18n="button.logout">Abmelden</button>
        </div>
    </div>
    <div class="statistiken">
        <div class="dashboard-card form-card">
            <h2 data-i18n="server.add_subtitle">Neuer Linux-Server</h2>
            <form id="serverForm">
                <div class="form-group">
                    <label data-i18n="server.hostname">Hostname</label>
                    <input type="text" id="hostname" placeholder="proxmox01" required
                           data-i18n-placeholder="server.hostname_placeholder">
                </div>
                <div class="form-group">
                    <label data-i18n="server.ip">IP-Adresse</label>
                    <input type="text" id="ip" placeholder="192.168.178.20" required
                           data-i18n-placeholder="server.ip_placeholder">
                </div>
                <div class="form-group">
                    <label data-i18n="server.port">SSH-Port</label>
                    <input type="number" id="port" value="22" required>
                </div>
                <div class="form-group">
                    <label data-i18n="server.username">SSH Benutzer</label>
                    <input type="text" id="username" placeholder="root" required
                           data-i18n-placeholder="server.username_placeholder">
                </div>
                <div class="form-group">
                    <label data-i18n="server.password_optional">SSH Passwort (optional bei SSH-Key)</label>
                    <input type="password" id="password" placeholder="Nur wenn kein SSH-Key verwendet wird"
                           data-i18n-placeholder="server.password_placeholder">
                </div>
                <div class="form-group">
                    <label data-i18n="server.private_key_optional">SSH Private Key Pfad (optional)</label>
                    <input type="text" id="privateKey" placeholder="/home/gatecore/.ssh/id_ed25519"
                           data-i18n-placeholder="server.private_key_placeholder">
                </div>
                <div class="button-row">
                    <button type="button" id="testButton" data-i18n="button.test">Verbindung testen</button>
                    <button type="submit" data-i18n="server.save">Server speichern</button>
                </div>
            </form>
            <div id="status"></div>
        </div>
    </div>
</body>
</html>
