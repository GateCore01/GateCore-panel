<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server hinzufügen</title>
    <script src="/js/server_add.js"></script>
    <link rel="stylesheet" href="/css/panel.css">
    <script src="/js/auth.js"></script>
</head>

<body>

<div class="sidebar">
    <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">

    <h2>GateCore-Panel</h2>

    <ul>
        <li><a href="/panel">Dashboard</a></li>
        <li><a href="/panel/lxc">LXC</a></li>
        <li><a href="/panel/servers">Server</a></li>
        <li><a href="/panel/users">Benutzer</a></li>
        <li><a href="/panel/logs">Logs</a></li>
        <li><a href="/panel/backup">Backup</a></li>
        <li><a href="/panel/storage">Speicher</a></li>
        <li><a href="/panel/settings">Einstellungen</a></li>
    </ul>
</div>

<div class="taskbar-oben">

    <div class="taskbar-oben-left">
        <h1>Server hinzufügen</h1>
    </div>

    <div class="taskbar-oben-right">
        <button id="logoutButton">Abmelden</button>
    </div>

</div>

<div class="statistiken">

    <div class="dashboard-card form-card">

        <h2>Neuer Linux-Server</h2>

        <form id="serverForm">

            <div class="form-group">
                <label>Hostname</label>
                <input
                    type="text"
                    id="hostname"
                    placeholder="proxmox01"
                    required
                >
            </div>

            <div class="form-group">
                <label>IP-Adresse</label>
                <input
                    type="text"
                    id="ip"
                    placeholder="192.168.178.20"
                    required
                >
            </div>

            <div class="form-group">
                <label>SSH-Port</label>
                <input
                    type="number"
                    id="port"
                    value="22"
                    required
                >
            </div>

            <div class="form-group">
                <label>SSH Benutzer</label>
                <input
                    type="text"
                    id="username"
                    placeholder="root"
                    required
                >
            </div>

            <div class="form-group">
                <label>SSH Passwort (optional bei SSH-Key)</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Nur wenn kein SSH-Key verwendet wird"
                >
            </div>

            <div class="form-group">
                <label>SSH Private Key Pfad (optional)</label>
                <input
                    type="text"
                    id="privateKey"
                    placeholder="/home/gatecore/.ssh/id_ed25519"
                >
            </div>

            <div class="button-row">

                <button
                    type="button"
                    id="testButton">

                    Verbindung testen

                </button>

                <button
                    type="submit">

                    Server speichern

                </button>

            </div>

        </form>

        <div id="status"></div>

    </div>

</div>

</body>
</html>
