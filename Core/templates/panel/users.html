<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="user.title">Benutzerverwaltung</title>
    <script src="/js/i18n.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <link rel="stylesheet" href="/css/panel.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>

<div class="sidebar">
    <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">
    <h2>GateCore-Panel</h2>
    <ul>
        <li><a href="/panel" data-i18n="sidebar.dashboard">Dashboard</a></li>
        <li><a href="/panel/docker" data-i18n="sidebar.docker">LXC</a></li>
        <li><a href="/panel/servers" data-i18n="sidebar.servers">Server</a></li>
        <li><a href="/panel/users" data-i18n="sidebar.users">Benutzer</a></li>
        <li><a href="/panel/logs" data-i18n="sidebar.logs">Logs</a></li>
        <li><a href="/panel/backup" data-i18n="sidebar.backup">Backup</a></li>
        <li><a href="/panel/storage" data-i18n="sidebar.storage">Speicher</a></li>
        <li><a href="/panel/settings" data-i18n="sidebar.settings">Einstellungen</a></li>
    </ul>
</div>

<div class="taskbar-oben">
    <div class="taskbar-oben-left">
        <h1 data-i18n="user.title">Benutzerverwaltung</h1>
    </div>
    <div class="taskbar-oben-right">
        <button id="logoutButton" data-i18n="button.logout">Abmelden</button>
    </div>
</div>

<div class="statistiken">
    <!-- Benutzer hinzufügen -->
    <div class="form-card">
        <h2 data-i18n="user.add">Benutzer hinzufügen</h2>
        <form id="userForm">
            <div class="form-group">
                <label data-i18n="user.username">Benutzername</label>
                <input type="text" id="username" placeholder="Benutzername" required
                       data-i18n-placeholder="user.username_placeholder">
            </div>
            <div class="form-group">
                <label data-i18n="user.password">Passwort</label>
                <input type="password" id="password" placeholder="Passwort" required
                       data-i18n-placeholder="user.password_placeholder">
            </div>
            <button type="submit" data-i18n="user.create">Benutzer erstellen</button>
        </form>
        <div id="userStatus"></div>
    </div>

    <br>

    <!-- Benutzerliste -->
    <div class="table-card">
        <h2 data-i18n="user.existing">Vorhandene Benutzer</h2>
        <table id="userTable">
            <thead>
                <tr>
                    <th data-i18n="user.id">ID</th>
                    <th data-i18n="user.username">Benutzername</th>
                    <th data-i18n="user.actions">Aktionen</th>
                </tr>
            </thead>
            <tbody id="userBody">
                <script src="/js/users.js" defer></script>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
