<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benutzerverwaltung</title>

    <link rel="stylesheet" href="/css/panel.css">
</head>

<body>

<div class="sidebar">

    <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">

    <h2>GateCore-Panel</h2>

    <ul>
        <li><a href="/panel">Dashboard</a></li>
        <li><a href="/panel/lxc">LXC</a></li>
        <li><a href="/panel/servers">Server</a></li>
        <li><a href="/panel/users">Benutzer</a></li>
        <li><a href="/panel/logs">Logs</a></li>
        <li><a href="/panel/backup">Backup</a></li>
        <li><a href="/panel/storage">Speicher</a></li>
        <li><a href="/panel/settings">Einstellungen</a></li>
    </ul>

</div>

<div class="taskbar-oben">

    <div class="taskbar-oben-left">
        <h1>Benutzerverwaltung</h1>
    </div>

    <div class="taskbar-oben-right">
        <button id="logoutButton">Abmelden</button>
    </div>

</div>

<div class="statistiken">

    <!-- Benutzer hinzufügen -->

    <div class="form-card">

        <h2>Benutzer hinzufügen</h2>

        <form id="userForm">

            <div class="form-group">
                <label>Benutzername</label>

                <input
                    type="text"
                    id="username"
                    placeholder="Benutzername"
                    required>
            </div>

            <div class="form-group">
                <label>Passwort</label>

                <input
                type="password"
                id="password"
                placeholder="Passwort"
                required>
        </div>

        <button type="submit">
            Benutzer erstellen
        </button>

</form>

        <div id="userStatus"></div>

    </div>

    <br>

    <!-- Benutzerliste -->

    <div class="table-card">

        <h2>Vorhandene Benutzer</h2>

        <table id="userTable">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Benutzername</th>
                    <th>Aktionen</th>

                </tr>

            </thead>

            <tbody id="userBody">

            <!-- Wird von users.js gefüllt -->

            </tbody>

        </table>

    </div>

</div>

<script src="/js/users.js"></script>

</body>
</html>
