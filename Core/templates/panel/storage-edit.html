<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="storage.edit_title">BTRFS Pool bearbeiten</title>
    <link rel="stylesheet" href="/css/panel.css">
    <script src="/js/i18n.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <script src="/js/storage-edit.js" defer></script>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="sidebar">
        <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">
        <h2>GateCore-Panel</h2>
        <ul>
            <li><a href="/panel" data-i18n="sidebar.dashboard">Dashboard</a></li>
            <li><a href="/panel/docker" data-i18n="sidebar.docker">Docker</a></li>
            <li><a href="/panel/servers" data-i18n="sidebar.servers">Server</a></li>
            <li><a href="/panel/users" data-i18n="sidebar.users">Benutzer</a></li>
            <li><a href="/panel/logs" data-i18n="sidebar.logs">Logs</a></li>
            <li><a href="/panel/backup" data-i18n="sidebar.backup">Backup</a></li>
            <li><a href="/panel/storage" data-i18n="sidebar.storage">Speicher</a></li>
            <li><a href="/panel/settings" data-i18n="sidebar.settings">Einstellungen</a></li>
        </ul>
    </div>
    <div class="taskbar-oben">
        <div class="taskbar-oben-left">
            <h1 data-i18n="storage.edit_title">BTRFS Pool bearbeiten</h1>
        </div>
        <div class="taskbar-oben-right">
            <button onclick="window.location='/panel/storage'" data-i18n="button.back">Zurück</button>
            <button id="logoutButton" data-i18n="button.logout">Abmelden</button>
        </div>
    </div>
    <div class="statistiken">
        <div class="form-card">
            <h2 data-i18n="storage.pool_settings">Pooleinstellungen</h2>
            <form id="editPoolForm">
                <div class="form-group">
                    <label data-i18n="storage.name">Name</label>
                    <input type="text" id="poolname" readonly>
                </div>
                <div class="form-group">
                    <label data-i18n="storage.raid_level">RAID-Level</label>
                    <select id="raid">
                        <option value="single">Single</option>
                        <option value="raid0">RAID0</option>
                        <option value="raid1">RAID1</option>
                        <option value="raid10">RAID10</option>
                        <option value="raid5">RAID5</option>
                        <option value="raid6">RAID6</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="storage.mountpoint">Mountpoint</label>
                    <input type="text" id="mountpoint">
                </div>
                <div class="button-row">
                    <button type="submit" data-i18n="button.save">Änderungen speichern</button>
                    <button type="button" onclick="window.location='/panel/storage'" data-i18n="button.back">Abbrechen</button>
                </div>
            </form>
            <div id="status"></div>
        </div>
    </div>
</body>
</html>
