<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="docker.title">Docker Container</title>
    <link rel="stylesheet" href="/css/panel.css">
    <script src="/js/i18n.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <script src="/js/docker.js" defer></script>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="sidebar">
        <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">
        <h2>GateCore-Panel</h2>
        <ul>
            <li><a href="/panel" data-i18n="sidebar.dashboard">Dashboard</a></li>
            <li><a href="/panel/docker" data-i18n="sidebar.docker">Docker</a></li>
            <li><a href="/panel/servers" data-i18n="sidebar.servers">Server</a></li>
            <li><a href="/panel/users" data-i18n="sidebar.users">Benutzer</a></li>
            <li><a href="/panel/logs" data-i18n="sidebar.logs">Logs</a></li>
            <li><a href="/panel/backup" data-i18n="sidebar.backup">Backup</a></li>
            <li><a href="/panel/storage" data-i18n="sidebar.storage">Speicher</a></li>
            <li><a href="/panel/settings" data-i18n="sidebar.settings">Einstellungen</a></li>
        </ul>
    </div>

    <div class="taskbar-oben">
        <div class="taskbar-oben-left">
            <h1 data-i18n="docker.title">Docker Container</h1>
        </div>
        <div class="taskbar-oben-right">
            <button onclick="window.location='/panel/docker_add'" data-i18n="button.add_container">+ Container</button>
            <button id="logoutButton" data-i18n="button.logout">Abmelden</button>
        </div>
    </div>

    <div class="statistiken">
        <div class="table-card">
            <h2 data-i18n="docker.containers">Container</h2>
            <table id="containerTable">
                <thead>
                    <tr>
                        <th data-i18n="docker.id">ID</th>
                        <th data-i18n="docker.name">Name</th>
                        <th data-i18n="docker.image">Image</th>
                        <th data-i18n="docker.status">Status</th>
                        <th data-i18n="docker.created">Erstellt</th>
                        <th data-i18n="docker.actions">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="containerBody">
                    <tr><td colspan="6" class="empty-row" data-i18n="docker.no_containers">Keine Container vorhanden.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Der Shell-Button wird über JavaScript dynamisch hinzugefügt,
         aber wir brauchen ihn auch im statischen HTML (wird von JS generiert).
         Deshalb bleibt alles im Skript. -->
</body>
</html>
