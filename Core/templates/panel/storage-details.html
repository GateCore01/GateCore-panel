<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="storage.details_title">BTRFS Pool Details</title>
    <link rel="stylesheet" href="/css/panel.css">
    <script src="/js/i18n.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <script src="/js/storage-details.js" defer></script>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="sidebar">
        <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">
        <h2>GateCore-Panel</h2>
        <ul>
            <li><a href="/panel" data-i18n="sidebar.dashboard">Dashboard</a></li>
            <li><a href="/panel/docker" data-i18n="sidebar.docker">Docker</a></li>
            <li><a href="/panel/servers" data-i18n="sidebar.servers">Server</a></li>
            <li><a href="/panel/users" data-i18n="sidebar.users">Benutzer</a></li>
            <li><a href="/panel/logs" data-i18n="sidebar.logs">Logs</a></li>
            <li><a href="/panel/backup" data-i18n="sidebar.backup">Backup</a></li>
            <li><a href="/panel/storage" data-i18n="sidebar.storage">Speicher</a></li>
            <li><a href="/panel/settings" data-i18n="sidebar.settings">Einstellungen</a></li>
        </ul>
    </div>
    <div class="taskbar-oben">
        <div class="taskbar-oben-left">
            <h1 data-i18n="storage.details_title">BTRFS Pool Details</h1>
        </div>
        <div class="taskbar-oben-right">
            <button onclick="window.location='/panel/storage'" data-i18n="button.back">Zurück</button>
            <button id="logoutButton" data-i18n="button.logout">Abmelden</button>
        </div>
    </div>
    <div class="statistiken">
        <div class="table-card">
            <h2 data-i18n="storage.general_info">Allgemeine Informationen</h2>
            <table>
                <tbody>
                    <tr><th data-i18n="storage.name">Name</th><td id="poolName">-</td></tr>
                    <tr><th data-i18n="storage.server">Server</th><td id="serverName">-</td></tr>
                    <tr><th data-i18n="storage.raid_level">RAID-Level</th><td id="poolRaid">-</td></tr>
                    <tr><th data-i18n="storage.mountpoint">Mountpoint</th><td id="poolMountpoint">-</td></tr>
                    <tr><th data-i18n="storage.devices">Geräte</th><td id="poolDevices">-</td></tr>
                </tbody>
            </table>
        </div>
        <br><br>
        <div class="table-card">
            <h2 data-i18n="storage.subvolumes">Subvolumes</h2>
            <table id="subvolumeTable">
                <thead>
                    <tr>
                        <th data-i18n="storage.name">Name</th>
                        <th data-i18n="storage.path">Pfad</th>
                        <th data-i18n="storage.actions">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="subvolumeBody"></tbody>
            </table>
        </div>
        <br><br>
        <div class="table-card">
            <h2 data-i18n="storage.snapshots">Snapshots</h2>
            <table id="snapshotTable">
                <thead>
                    <tr>
                        <th data-i18n="storage.name">Name</th>
                        <th data-i18n="storage.path">Pfad</th>
                        <th data-i18n="storage.created">Erstellt</th>
                        <th data-i18n="storage.actions">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="snapshotBody"></tbody>
            </table>
        </div>
    </div>
</body>
</html>
