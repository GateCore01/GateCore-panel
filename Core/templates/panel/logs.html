<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs</title>
    <link rel="stylesheet" href="/css/panel.css">
    <script src="/js/logs.js" defer></script>
    <script src="/js/auth.js"></script>
</head>

<body>

<div class="sidebar">

    <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">

    <h2>GateCore-Panel</h2>

    <ul>
        <li><a href="/panel">Dashboard</a></li>
        <li><a href="/panel/lxc">LXC</a></li>
        <li><a href="/panel/servers">Server</a></li>
        <li><a href="/panel/users">Benutzer</a></li>
        <li><a href="/panel/logs">Logs</a></li>
        <li><a href="/panel/backup">Backup</a></li>
        <li><a href="/panel/storage">Speicher</a></li>
        <li><a href="/panel/settings">Einstellungen</a></li>
    </ul>

</div>

<div class="taskbar-oben">

    <div class="taskbar-oben-left">
        <h1>System-Logs</h1>
    </div>

    <div class="taskbar-oben-right">

        <button id="refreshButton">
            Aktualisieren
        </button>

        <button id="clearButton">
            Logs löschen
        </button>

        <button id="logoutButton">
            Abmelden
        </button>

    </div>

</div>

<div class="statistiken">

    <div class="table-card">

        <div class="table-header">

            <h2>Protokolle</h2>

            <div class="filter-row">

                <select id="serverFilter">

                    <option value="all">

                        Alle Server

                    </option>

                </select>

                <select id="logLevel">

                    <option value="all">

                        Alle Level

                    </option>

                    <option value="INFO">

                        INFO

                    </option>

                    <option value="WARNING">

                        WARNING

                    </option>

                    <option value="ERROR">

                        ERROR

                    </option>

                </select>

            </div>

        </div>

        <table id="logsTable">

            <thead>

            <tr>

                <th>Zeit</th>
                <th>Server</th>
                <th>Level</th>
                <th>Benutzer</th>
                <th>Aktion</th>
                <th>Details</th>

            </tr>

            </thead>

            <tbody id="logsBody">

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
