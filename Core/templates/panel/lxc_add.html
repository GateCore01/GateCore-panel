<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="lxc.add_title">LXC hinzufügen</title>
    <link rel="stylesheet" href="/css/panel.css">
    <script src="/js/i18n.js" defer></script>
    <script src="/js/lxc_add.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>

<div class="sidebar">
    <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">
    <h2>GateCore-Panel</h2>
    <ul>
        <li><a href="/panel" data-i18n="sidebar.dashboard">Dashboard</a></li>
        <li><a href="/panel/lxc" data-i18n="sidebar.lxc">LXC</a></li>
        <li><a href="/panel/servers" data-i18n="sidebar.servers">Server</a></li>
        <li><a href="/panel/users" data-i18n="sidebar.users">Benutzer</a></li>
        <li><a href="/panel/logs" data-i18n="sidebar.logs">Logs</a></li>
        <li><a href="/panel/backup" data-i18n="sidebar.backup">Backup</a></li>
        <li><a href="/panel/storage" data-i18n="sidebar.storage">Speicher</a></li>
        <li><a href="/panel/settings" data-i18n="sidebar.settings">Einstellungen</a></li>
    </ul>
</div>

<div class="taskbar-oben">
    <div class="taskbar-oben-left">
        <h1 data-i18n="lxc.add_title">LXC hinzufügen</h1>
    </div>
    <div class="taskbar-oben-right">
        <button id="logoutButton" data-i18n="button.logout">Abmelden</button>
    </div>
</div>

<div class="statistiken">
    <div class="dashboard-card form-card">
        <h2 data-i18n="lxc.add_subtitle">Neuen Container registrieren</h2>
        <form id="lxcForm">
            <div class="form-group">
                <label data-i18n="lxc.name">Containername</label>
                <input type="text" id="name" placeholder="HomeAssistant" required
                       data-i18n-placeholder="lxc.name_placeholder">
            </div>
            <div class="form-group">
                <label data-i18n="lxc.vmid">Container-ID (VMID)</label>
                <input type="number" id="vmid" placeholder="101" required
                       data-i18n-placeholder="lxc.vmid_placeholder">
            </div>
            <div class="form-group">
                <label data-i18n="lxc.server">Server</label>
                <select id="server" required></select>
            </div>
            <div class="form-group">
                <label data-i18n="lxc.template">Template</label>
                <select id="template" required>
                    <option value="download" data-i18n="lxc.template_download">Standard-Download</option>
                </select>
            </div>
            <div class="button-row">
                <button type="submit" data-i18n="lxc.save_container">Container speichern</button>
            </div>
        </form>
        <div id="status"></div>
    </div>
</div>

</body>
</html>
