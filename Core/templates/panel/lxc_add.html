<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LXC hinzufügen</title>
    <link rel="stylesheet" href="/css/panel.css">
    <script src="/js/lxc_add.js" defer></script>
    <script src="/js/auth.js"></script>
</head>

<body>

<div class="sidebar">

    <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">

    <h2>GateCore-Panel</h2>

    <ul>
        <li><a href="/panel">Dashboard</a></li>
        <li><a href="/panel/lxc">LXC</a></li>
        <li><a href="/panel/servers">Server</a></li>
        <li><a href="/panel/users">Benutzer</a></li>
        <li><a href="/panel/logs">Logs</a></li>
        <li><a href="/panel/backup">Backup</a></li>
        <li><a href="/panel/storage">Speicher</a></li>
        <li><a href="/panel/settings">Einstellungen</a></li>
    </ul>

</div>

<div class="taskbar-oben">

    <div class="taskbar-oben-left">
        <h1>LXC hinzufügen</h1>
    </div>

    <div class="taskbar-oben-right">
        <button id="logoutButton">Abmelden</button>
    </div>

</div>

<div class="statistiken">

    <div class="dashboard-card form-card">

        <h2>Neuen Container registrieren</h2>

        <form id="lxcForm">

            <div class="form-group">
                <label>Containername</label>
                <input
                    type="text"
                    id="name"
                    placeholder="HomeAssistant"
                    required>
            </div>

            <div class="form-group">
                <label>Container-ID (VMID)</label>
                <input
                    type="number"
                    id="vmid"
                    placeholder="101"
                    required>
            </div>

            <div class="form-group">
                <label>Server</label>

                <select id="server" required>

                </select>

            </div>

            <div class="button-row">

                <button type="submit">

                    Container speichern

                </button>

            </div>

        </form>

        <div id="status"></div>

    </div>

</div>

</body>
</html>
