<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="sidebar.lxc">LXC</title>
    <link rel="stylesheet" href="/css/panel.css">
    <script src="/js/i18n.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <script src="/js/lxc.js" defer></script>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Sidebar wie oben mit data-i18n -->
    <div class="sidebar">
        <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">
        <h2>GateCore-Panel</h2>
        <ul>
            <li><a href="/panel" data-i18n="sidebar.dashboard">Dashboard</a></li>
            <li><a href="/panel/lxc" data-i18n="sidebar.lxc">LXC</a></li>
            <li><a href="/panel/servers" data-i18n="sidebar.servers">Server</a></li>
            <li><a href="/panel/users" data-i18n="sidebar.users">Benutzer</a></li>
            <li><a href="/panel/logs" data-i18n="sidebar.logs">Logs</a></li>
            <li><a href="/panel/backup" data-i18n="sidebar.backup">Backup</a></li>
            <li><a href="/panel/storage" data-i18n="sidebar.storage">Speicher</a></li>
            <li><a href="/panel/settings" data-i18n="sidebar.settings">Einstellungen</a></li>
        </ul>
    </div>
    <div class="taskbar-oben">
        <div class="taskbar-oben-left">
            <h1 data-i18n="sidebar.lxc">LXC</h1>
        </div>
        <div class="taskbar-oben-right">
            <button onclick="window.location='/panel/lxc_add'" data-i18n="button.add_container">+ Container</button>
            <button id="logoutButton" data-i18n="button.logout">Abmelden</button>
        </div>
    </div>
    <div class="statistiken">
        <div class="table-card">
            <h2 data-i18n="dashboard.lxc">LXC Container</h2>
            <table id="serverTable">
                <thead>
                    <tr>
                        <th data-i18n="lxc.id">ID</th>
                        <th data-i18n="lxc.name">Name</th>
                        <th data-i18n="lxc.host">Host</th>
                        <th data-i18n="lxc.status">Status</th>
                        <th data-i18n="lxc.ip">IP-Adresse</th>
                        <th data-i18n="lxc.cpu">CPU</th>
                        <th data-i18n="lxc.ram">RAM</th>
                        <th data-i18n="lxc.actions">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="serverBody"></tbody>
            </table>
        </div>
    </div>
</body>
</html>
