<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server</title>
    <script src="/js/lxc.js"></script>
    <link rel="stylesheet" href="/css/panel.css">
</head>

<body>

<div class="sidebar">

    <img src="/svg/gati.svg" alt="GateCore Logo" class="header-svg-gati">

    <h2>GateCore-Panel</h2>

    <ul>
        <li><a href="/panel">Dashboard</a></li>
        <li><a href="/panel/lxc">LXC</a></li>
        <li><a href="/panel/servers">Server</a></li>
        <li><a href="/panel/users">Benutzer</a></li>
        <li><a href="/panel/logs">Logs</a></li>
        <li><a href="/panel/backup">Backup</a></li>
        <li><a href="/panel/storage">Speicher</a></li>
        <li><a href="/panel/settings">Einstellungen</a></li>
    </ul>

</div>

<div class="taskbar-oben">

    <div class="taskbar-oben-left">
        <h1>LXC</h1>
    </div>

    <div class="taskbar-oben-right">

        <button
            onclick="window.location='/panel/lxc_add'">

            + Container

        </button>

        <button id="logoutButton">

            Abmelden

        </button>

    </div>

</div>

<div class="statistiken">

    <div class="table-card">

        <h2>Registrierte Server</h2>

        <table id="serverTable">

        <thead>

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Host</th>

            <th>Status</th>

            <th>IP-Adresse</th>

            <th>CPU</th>

            <th>RAM</th>

            <th>Aktionen</th>

        </tr>

        </thead>

        <tbody id="serverBody">

        </tbody>

        </table>

    </div>

</div>

</body>
</html>
