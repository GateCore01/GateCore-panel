<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host-Shell</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/auth.js"></script>
</head>
<body class="panel-sidebar">
    <div class="sidebar">
        <h2>GateCore</h2>
        <ul>
            <li><a href="/panel.html" onclick="event.preventDefault(); guardPanelNavigation('/panel.html')">Dashboard</a></li>
            <li><a href="/server.html" onclick="event.preventDefault(); guardPanelNavigation('/server.html')">Server</a></li>
            <li><a href="/server-shell.html" onclick="event.preventDefault(); guardPanelNavigation('/server-shell.html')">Server-Shell</a></li>
            <li class="active">Host-Shell</li>
            <li><a href="/backup.html" onclick="event.preventDefault(); guardPanelNavigation('/backup.html')">Backups</a></li>
            <li><a href="/user.html" onclick="event.preventDefault(); guardPanelNavigation('/user.html')">Benutzerverwaltung</a></li>
            <li><a href="/hosts.html" onclick="event.preventDefault(); guardPanelNavigation('/hosts.html')">Hosts</a></li>
            <li><a href="/settings.html" onclick="event.preventDefault(); guardPanelNavigation('/settings.html')">Einstellungen</a></li>
        </ul>
    </div>

    <div class="main">
        <div class="topbar">
            <input type="text" placeholder="Suchen..." disabled>
            <div class="user">Admin</div>
        </div>

        <div class="content">
            <div class="chart">
                <h2>Host-Shell</h2>
                <p>Hier kannst du Befehle direkt an den Host senden und die Ausgabe in Echtzeit sehen.</p>
                <p>Wähle deinen Host aus:</p>
                <select id="select-host">
                    <option value="">-- Host auswählen --</option>
                </select>
                <br><br>
                <div class="server-shell">
                    <div id="shell-output" class="shell-output"></div>
                    <input type="text" id="shell-input" placeholder="Befehl eingeben...">
                    <button id="send-command-button">Senden</button>
                </div>
            </div>
        </div>
    </div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    requireAuth();
});
</script>
</body>
